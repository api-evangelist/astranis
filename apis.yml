name: Astranis
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
description: Astranis designs, manufactures, and operates small, dedicated geostationary
  communications satellites known as MicroGEO. Each spacecraft uses radiation-hardened digital
  payload technology to deliver dedicated broadband capacity to specific countries, telecom
  operators, enterprise users, and the U.S. government. Astranis is a satellite operator and
  manufacturer rather than an API provider; it does not publish a public developer API.
